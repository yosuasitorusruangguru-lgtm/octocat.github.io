<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAW Summary & Dodolan Dashboard</title>
  <style>
    :root {
      --ink: #17211f;
      --muted: #5f706a;
      --line: #d9e1dc;
      --paper: #f6f7f1;
      --panel: #fff;
      --dark: #203632;
      --green: #1e9b66;
      --red: #d64e47;
      --amber: #d19a22;
      --blue: #327aa8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, Aptos, Segoe UI, Arial, sans-serif;
    }
    header {
      background: var(--dark);
      color: white;
      padding: 22px 28px 18px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
    }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 38px); letter-spacing: 0; }
    h2 { margin: 0; font-size: 18px; }
    .sub { color: #dce9e2; margin-top: 6px; font-size: 14px; }
    main { max-width: 1540px; margin: 0 auto; padding: 20px; }
    button, a.button, select, input {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--dark);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 750;
    }
    button, a.button { cursor: pointer; text-decoration: none; }
    header button, header a.button { border-color: rgba(255,255,255,.25); }
    .actions, .filters { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; }
    .tab { white-space: nowrap; }
    .tab.active { background: var(--dark); color: #fff; border-color: var(--dark); }
    .toolbar {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .label { color: var(--muted); font-size: 12px; font-weight: 850; letter-spacing: .04em; text-transform: uppercase; }
    .status { min-height: 20px; color: var(--muted); font-size: 13px; margin-bottom: 12px; }
    .error { display: none; background: #ffe1de; border: 1px solid #f0aaa5; color: #7d221f; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .kpis { display: grid; grid-template-columns: repeat(5, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 15px; box-shadow: 0 1px 0 rgba(20,30,28,.04); }
    .value { margin-top: 7px; font-size: clamp(23px, 3vw, 32px); font-weight: 900; }
    .note { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
    .split { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .metric-list { display: grid; gap: 10px; }
    .metric-row { display: grid; grid-template-columns: minmax(160px,1fr) 130px 80px; gap: 10px; align-items: center; border-bottom: 1px solid var(--line); padding-bottom: 9px; }
    .metric-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .name { font-weight: 780; overflow-wrap: anywhere; }
    .money, .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 780; }
    .bar { height: 12px; border-radius: 999px; background: #e8eee9; overflow: hidden; margin-top: 6px; }
    .bar > span { display: block; height: 100%; border-radius: 999px; background: var(--blue); min-width: 2px; }
    .table-wrap { overflow: auto; max-height: 620px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    table { border-collapse: collapse; width: 100%; min-width: 980px; font-size: 13px; }
    th, td { padding: 9px 11px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; vertical-align: top; }
    th { position: sticky; top: 0; z-index: 1; background: #eef4ef; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
    td.number, th.number { text-align: right; font-variant-numeric: tabular-nums; }
    @media (max-width: 1100px) {
      header, .toolbar { align-items: start; flex-direction: column; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .grid, .split { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      main { padding: 14px; }
      .kpis { grid-template-columns: 1fr; }
      .metric-row { grid-template-columns: 1fr; }
      .money, .num { text-align: left; }
    }
  </style>
</head>

    function schemaRateFor(category, achievement, week, teamCategory = "LAYER 1") {
      if (["23", "24"].includes(String(week))) {
        const rates = normalizedTeamCategory(teamCategory) === "LAYER 2" ? WEEK_23_24_LAYER_2_RATES : WEEK_23_24_LAYER_1_RATES;

        const rates = normalizedTeamCategory(teamCategory) === "LAYER 2" ? WEEK_26_LAYER_2_RATES : WEEK_26_LAYER_1_RATES;
        return layer1RateFor(rates, category, achievement);
      }

      let selected = null;
      calculatorSchema.tiers.forEach((tier) => {

    function calculateSchemaIncentives(rows) {
      const grouped = new Map();
      rows.forEach((row) => {
        const teamCategory = normalizedTeamCategory(row.teamCategory) || "-";
        const key = `${row.agent}||${row.week}||${teamCategory}`;
        const current = grouped.get(key) || { agent: row.agent, week: row.week, teamCategory, revenue: 0, txn: 0, rows: [] };
        current.revenue += row.amount;
        current.txn += row.txn;
        current.rows.push(row);
        grouped.set(key, current);
      });
      const weekly = [...grouped.values()].map((group) => {
        const schemaTeamCategory = isDwiAgustinTargetOverride(group.agent, group.week) ? "LAYER 2" : group.teamCategory;
        const targetRevenue = targetForWeek(group.week, schemaTeamCategory, group.agent);
        const achievement = targetRevenue ? group.revenue / targetRevenue : 0;
        const categories = {};
        let incentive = 0;
        group.rows.forEach((row) => {
          const category = ["23", "24", "25", "26"].includes(String(group.week)) ? week25ProductCategory(row) : productCategory(row);
          const amount = row.amount;
          const rate = schemaRateFor(category, achievement, group.week, schemaTeamCategory);
          const value = amount * rate;
          incentive += value;
          const item = categories[category] || { amount: 0, incentive: 0, txn: 0 };
          item.amount += amount;
          item.incentive += value;
          item.txn += row.txn;
          categories[category] = item;
        });
        return { ...group, teamCategory: schemaTeamCategory, targetRevenue, achievement, incentive, categories };
      });
      const agents = new Map();
      weekly.forEach((row) => {
        const key = `${row.agent}||${row.teamCategory}`;
        const item = agents.get(key) || { key: row.agent, teamCategory: row.teamCategory, amount: 0, txn: 0, incentive: 0, weeks: 0, maxAchievement: 0 };
        item.amount += row.revenue;
        item.txn += row.txn;
        item.incentive += row.incentive;
        item.weeks += 1;
        item.maxAchievement = Math.max(item.maxAchievement, row.achievement);
        agents.set(key, item);
      });
      return {
        weekly: weekly.sort((a, b) => Number(a.week) - Number(b.week) || b.incentive - a.incentive),
        agents: [...agents.values()].sort((a, b) => b.incentive - a.incentive)
      };
    }

    function earlybirdRubelTable(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>Group</th><th>Tanggal Rilis</th><th>Deeplink</th><th>Paket</th><th>PKG Serial</th><th>Package Name</th><th>Masa Aktif</th><th class="number">Base Price</th><th class="number">ATL Disc</th><th class="number">After Price Lunas</th><th class="number">Rounding After Price</th><th class="number">BTL Disc</th><th class="number">Lunas</th><th class="number">Cashback</th><th class="number">Flash Sale Disc</th><th class="number">Flash Sale Price</th></tr></thead><tbody>${rows.map((r) => {
        const link = r.deeplink || (r.serial ? `https://bayar.ruangguru.com/packages-list?package_serial=${encodeURIComponent(r.serial)}&voucher_serial=` : "");
        return `<tr><td>${esc(r.group)}</td><td>${esc(r.releaseDate)}</td><td>${link ? `<a class="button" href="${esc(link)}" target="_blank" rel="noreferrer">Buka</a>` : ""}</td><td>${esc(r.packageType)}</td><td>${esc(r.serial)}</td><td>${esc(r.packageName)}</td><td>${esc(r.activeUntil)}</td><td class="number">${rupiah(r.basePrice)}</td><td class="number">${esc(r.atlDiscount)}</td><td class="number">${rupiah(r.atlAfterPrice)}</td><td class="number">${rupiah(r.roundingAfterPrice)}</td><td class="number">${esc(r.btlDiscount)}</td><td class="number">${rupiah(r.lunas)}</td><td class="number">${r.cashback ? rupiah(r.cashback) : ""}</td><td class="number">${esc(r.flashSaleDiscount)}</td><td class="number">${rupiah(r.flashSalePrice)}</td></tr>`;
      }).join("") || `<tr><td colspan="16">Tidak ada data.</td></tr>`}</tbody></table></div>`;
    }
    function renderFlashSaleRg() {
      const q = searchFilter.value.trim().toLowerCase();
      const rows = flashSaleRgRows.filter((r) => !q || [r.group, r.serial, r.packageName, r.bonus].some((v) => String(v || "").toLowerCase().includes(q)));
      const rubelRows = earlybirdRubelRows.filter((r) => !q || [r.group, r.packageType, r.serial, r.packageName].some((v) => String(v || "").toLowerCase().includes(q)));
      const lowestBtl = rows.reduce((min, r) => r.btlPriceAfter ? Math.min(min, r.btlPriceAfter) : min, Infinity);
      const groups = new Set(rows.map((r) => r.group).filter(Boolean)).size;
      contentEl.innerHTML = `
        <section class="kpis">
          ${kpi("Package", num(rows.length), "Hidden row/column sheet tidak ditampilkan")}
          ${kpi("Group", num(groups), "Section dari sheet")}
          ${kpi("BTL Terendah", Number.isFinite(lowestBtl) ? rupiah(lowestBtl) : "-", "Price After Disc")}
          ${kpi("Ruangbelajar", num(rubelRows.length), "Package")}
        </section>
        <section class="card">
          <div class="section-title"><h2>Flash Sale RG (18-20 JUN 2026)</h2><a class="button" href="https://docs.google.com/spreadsheets/d/${FLASHSALE_RG_SHEET_ID}/edit?gid=${FLASHSALE_RG_GID}" target="_blank" rel="noreferrer">Buka Sheet</a></div>
          ${flashSaleRgTable(rows)}
        </section>
        <section class="card" style="margin-top:16px">
          <div class="section-title"><h2>Ruangbelajar</h2><a class="button" href="https://docs.google.com/spreadsheets/d/${EARLYBIRD_RUBEL_SHEET_ID}/edit?gid=${EARLYBIRD_RUBEL_GID}" target="_blank" rel="noreferrer">Buka Sheet</a></div>
          ${earlybirdRubelTable(rubelRows)}
        </section>`;
    }
    function flashSaleRgTable(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>Group</th><th>PKG Serial</th><th>Package Name</th><th>Deeplink</th><th class="number">Base Price</th><th class="number">ATL Discount After</th><th class="number">ATL Price After Disc</th><th class="number">BTL Discount After</th><th class="number">BTL Price After Disc</th><th class="number">Cashback E-Wallet</th><th class="number">Max Sispres</th><th>Bonus Tambahan</th></tr></thead><tbody>${rows.map((r) => {
        const link = r.serial ? `https://bayar.ruangguru.com/packages-list?package_serial=${encodeURIComponent(r.serial)}&voucher_serial=` : "";
        return `<tr><td>${esc(r.group)}</td><td>${esc(r.serial)}</td><td>${esc(r.packageName)}</td><td>${link ? `<a class="button" href="${esc(link)}" target="_blank" rel="noreferrer">Buka</a>` : ""}</td><td class="number">${rupiah(r.basePrice)}</td><td class="number">${esc(r.atlDiscountAfter)}</td><td class="number">${rupiah(r.atlPriceAfter)}</td><td class="number">${esc(r.btlDiscountAfter)}</td><td class="number">${rupiah(r.btlPriceAfter)}</td><td class="number">${r.cashback ? rupiah(r.cashback) : ""}</td><td class="number">${r.maxSispres ? rupiah(r.maxSispres) : ""}</td><td>${esc(r.bonus)}</td></tr>`;
      }).join("") || `<tr><td colspan="12">Tidak ada data.</td></tr>`}</tbody></table></div>`;
    }
    function renderJadwalBac() {
      const q = searchFilter.value.trim().toLowerCase();
      const rows = combinedJadwalHargaBacRows().filter((row) => !q || [row.branchName, row.link, row.tier, row.branchGrade, row.serial, row.packageName].some((value) => String(value || "").toLowerCase().includes(q)));
      contentEl.innerHTML = `
        <section class="kpis">
          ${kpi("Baris Jadwal", num(rows.length), jadwalBacError ? "Data belum bisa dimuat" : "Sesuai filter pencarian")}
          ${kpi("Harga BAC Open", num(hargaBacRows.length), hargaBacError ? "Data belum bisa dimuat" : "Status OPEN")}
          ${kpi("Branch", num(new Set(rows.map((row) => row.branchName).filter(Boolean)).size), "Gabungan jadwal + harga")}
          ${kpi("Sheet", "PLOTING JADWAL", "BAC 26/27")}
        </section>
        <section class="card">
          <div class="section-title"><h2>Jadwal & Deeplink BAC26/27</h2><div><a class="button" href="https://docs.google.com/spreadsheets/d/${JADWAL_BAC_SHEET_ID}/edit?gid=${JADWAL_BAC_GID}" target="_blank" rel="noreferrer">Jadwal</a> <a class="button" href="https://docs.google.com/spreadsheets/d/${JADWAL_BAC_SHEET_ID}/edit?gid=${HARGA_BAC_GID}" target="_blank" rel="noreferrer">Harga</a></div></div>
          ${jadwalBacError || hargaBacError ? `<div class="error" style="display:block">${esc([jadwalBacError, hargaBacError].filter(Boolean).join(" | "))}</div>` : combinedJadwalHargaBacTable(rows)}
        </section>`;
    }
    function combinedJadwalHargaBacRows() {
      const scheduleByBranch = new Map(jadwalBacRows.map((row) => [String(row[0] || "").trim(), String(row[1] || "").trim()]));
      return hargaBacRows.map((row) => ({
        ...row,
        branchName: row.branch,
        link: scheduleByBranch.get(row.branch) || ""
      }));
    }
    function combinedJadwalHargaBacTable(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>Branch Name</th><th>Link Jadwal</th><th>Tier</th><th>Branch + Grade</th><th>PKG Serial</th><th>Package Name</th><th>Deeplink</th><th class="number">Base Price</th><th class="number">Disc Lunas</th><th class="number">After Disc Lunas</th><th class="number">Cicilan 2x</th><th class="number">Cicilan 3x</th><th class="number">DP + Pelunasan</th></tr></thead><tbody>${rows.map((row) => {
        const link = row.deeplink || (row.serial ? `https://bayar.ruangguru.com/packages-list?package_serial=${encodeURIComponent(row.serial)}&voucher_serial=` : "");
        const cicilan2 = [row.cicilan2Price1, row.cicilan2Price2].filter(Boolean).map(rupiah).join(" + ");
        const cicilan3 = [row.cicilan3Price1, row.cicilan3Price2, row.cicilan3Price3].filter(Boolean).map(rupiah).join(" + ");
        const dpPelunasan = [row.dpPelunasanDp, row.dpPelunasan].filter(Boolean).map(rupiah).join(" + ");
        return `<tr><td>${esc(row.branchName)}</td><td>${row.link ? `<a class="button" href="${esc(row.link)}" target="_blank" rel="noreferrer">Buka</a>` : ""}</td><td>${esc(row.tier)}</td><td>${esc(row.branchGrade)}</td><td>${esc(row.serial)}</td><td>${esc(row.packageName)}</td><td>${link ? `<a class="button" href="${esc(link)}" target="_blank" rel="noreferrer">Buka</a>` : ""}</td><td class="number">${rupiah(row.basePrice)}</td><td class="number">${esc(row.lunasDiscount)}</td><td class="number">${rupiah(row.lunasPrice)}</td><td class="number">${esc(cicilan2)}</td><td class="number">${esc(cicilan3)}</td><td class="number">${esc(dpPelunasan)}</td></tr>`;
      }).join("") || `<tr><td colspan="13">Tidak ada data open.</td></tr>`}</tbody></table></div>`;
    }
    function summaryAgentTable(rows) {
      rows.sort((a, b) => b.amount - a.amount);
      return `<div class="table-wrap"><table><thead><tr><th>Agent</th><th>Layer</th><th class="number">Revenue</th><th class="number">Incentive</th><th class="number">TXN</th><th class="number">ARPU</th></tr></thead><tbody>${rows.map((r) => `<tr><td>${esc(r.key)}</td><td>${esc(r.teamCategory || "-")}</td><td class="number">${rupiah(r.amount)}</td><td class="number">${rupiah(r.incentive)}</td><td class="number">${num(r.txn)}</td><td class="number">${rupiah(r.txn ? r.amount / r.txn : 0)}</td></tr>`).join("")}</tbody></table></div>`;
    }
    function schemaWeeklyTable(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>Week</th><th>Agent</th><th>Layer</th><th class="number">Target</th><th class="number">Achievement</th><th class="number">Revenue</th><th class="number">Schema Incentive</th><th class="number">TXN</th><th>Category Mix</th></tr></thead><tbody>${rows.map((r) => `<tr><td>Week ${esc(r.week)}</td><td>${esc(r.agent)}</td><td>${esc(r.teamCategory || "-")}</td><td class="number">${rupiah(r.targetRevenue)}</td><td class="number">${num(r.achievement * 100, 1)}%</td><td class="number">${rupiah(r.revenue)}</td><td class="number">${rupiah(r.incentive)}</td><td class="number">${num(r.txn)}</td><td>${esc(Object.entries(r.categories).map(([k, v]) => `${k}: ${rupiah(v.incentive)}`).join(" | "))}</td></tr>`).join("")}</tbody></table></div>`;
    }
    function summaryTable(rows) {
      rows.sort((a, b) => b.amount - a.amount);
      return `<div class="table-wrap"><table><thead><tr><th>Agent</th><th class="number">Revenue</th><th class="number">Incentive</th><th class="number">TXN</th><th class="number">ARPU</th></tr></thead><tbody>${rows.map((r) => `<tr><td>${esc(r.key)}</td><td class="number">${rupiah(r.amount)}</td><td class="number">${rupiah(r.incentive)}</td><td class="number">${num(r.txn)}</td><td class="number">${rupiah(r.txn ? r.amount / r.txn : 0)}</td></tr>`).join("")}</tbody></table></div>`;
    }
    function weeklyTable(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>Week</th><th class="number">Revenue RAW</th><th class="number">Incentive</th><th class="number">TXN</th><th class="number">Agent</th><th class="number">Incentive / Revenue</th></tr></thead><tbody>${rows.map((r) => `<tr><td>Week ${esc(r.key)}</td><td class="number">${rupiah(r.amount)}</td><td class="number">${rupiah(r.incentive)}</td><td class="number">${num(r.txn)}</td><td class="number">${num(r.agents.size)}</td><td class="number">${num(r.amount ? (r.incentive / r.amount * 100) : 0, 2)}%</td></tr>`).join("")}</tbody></table></div>`;
    }
    function detailTable(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Month</th><th>Week</th><th>Agent</th><th>Package</th><th>Product</th><th>Campaign</th><th class="number">Amount</th><th class="number">TXN</th></tr></thead><tbody>${rows.map((r) => `<tr><td>${esc(r.date)}</td><td>${esc(r.month)}</td><td>${esc(r.week)}</td><td>${esc(r.agent)}</td><td>${esc(r.package)}</td><td>${esc(r.product)}</td><td>${esc(r.campaign)}</td><td class="number">${rupiah(r.amount)}</td><td class="number">${num(r.txn)}</td></tr>`).join("")}</tbody></table></div>`;
    }
    async function loadAll(force = false) {
      try {
        errorEl.style.display = "none";
        statusEl.textContent = "Memuat RAW dan Incentive...";
        if (!rawTable || !incentiveTable || force) {
          [rawTable, incentiveTable, calculatorTable, baoEarlTableData, baoExtendTableData, ruangbelajarTableData, earlybirdRubelTableData, flashSaleRgTableData, jadwalBacTableData, hargaBacTableData] = await Promise.all([
            loadJsonp("RAW"),
            loadJsonp("Incentive"),
            loadJsonp("Kalkulator Incentive"),
            loadJsonp("Link Harga BAO Early Bird", { sheetId: BAO_EARL_SHEET_ID, gid: BAO_EARL_GID }),
            loadJsonp("Link Harga BAO Extend", { sheetId: BAO_EXTEND_SHEET_ID, gid: BAO_EXTEND_GID }),
            loadJsonp("Ruangbelajar", { sheetId: RUANGBELAJAR_SHEET_ID, gid: RUANGBELAJAR_GID }),
            loadJsonp("Earlybird Rubel", { sheetId: EARLYBIRD_RUBEL_SHEET_ID, gid: EARLYBIRD_RUBEL_GID }),
            loadJsonp("Flash Sale Festival RG", { sheetId: FLASHSALE_RG_SHEET_ID, gid: FLASHSALE_RG_GID }),
            loadOptionalJsonp("PLOTING JADWAL BAC 26/27", { sheetId: JADWAL_BAC_SHEET_ID, gid: JADWAL_BAC_GID }),
            loadOptionalJsonp("Harga BAC", { sheetId: JADWAL_BAC_SHEET_ID, gid: HARGA_BAC_GID })
          ]);
          rawRows = parseRaw(rawTable);
          incentiveRows = parseIncentive(incentiveTable);
          baoEarlRows = [
            ...parseBaoEarl(baoEarlTableData, "Early Bird"),
            ...parseBaoEarl(baoExtendTableData, "Extend")
          ];
          ruangbelajarRows = parseRuangbelajar(ruangbelajarTableData);
          earlybirdRubelRows = parseEarlybirdRubel(earlybirdRubelTableData);
          flashSaleRgRows = parseFlashSaleRg(flashSaleRgTableData);
          const jadwalBacParsed = parseJadwalBac(jadwalBacTableData.table);
          jadwalBacHeaders = jadwalBacParsed.headers;
          jadwalBacRows = jadwalBacParsed.rows;
          jadwalBacError = jadwalBacTableData.error;
          hargaBacRows = parseHargaBac(hargaBacTableData.table);
          hargaBacError = hargaBacTableData.error;
          calculatorSchema = parseCalculatorSchema(calculatorTable);
          setupFilters();
        }
        render();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = "block";
        statusEl.textContent = "Gagal memuat data.";
      }
    }
    tabs.forEach((tab) => tab.addEventListener("click", () => {
      activeView = tab.dataset.view;
      tabs.forEach((t) => t.classList.toggle("active", t === tab));
      render();
    }));
    [monthFilter, weekFilter, coachFilter, spvFilter, teamFilter, agentFilter].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });
    searchFilter.addEventListener("input", render);
    document.getElementById("refresh").addEventListener("click", () => loadAll(true));
    loadAll();
  </script>
</body>
</html>
